 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Successful</title>
    <style>
        body {
            font-family: sans-serif;
            /* Using standard color names */
            background-color: aliceblue;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .success-card {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            border: 2px solid black;
            /* Simple shadow using a semi-transparent black */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .icon-circle {
            width: 60px;
            height: 60px;
            background-color: green;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            margin: 0 auto 20px;
        }

        h2 {
            color: black;
            margin-bottom: 10px;
        }

        p {
            color: gray;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .btn-home {
            display: inline-block;
            background-color: black;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 12px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="icon-circle">✓</div>
        <h2>Registration Successful!</h2>
        <p>Thank you for registering with us. Your personal information has been securely saved.</p>
        <a href="index.html" class="btn-index">← Back to Home</a>
    </div>

</body>
</html>
