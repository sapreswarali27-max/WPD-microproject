body {

  body {

.container {

/* Blur effect layer */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background-image: url("blue.avif");
  background-size: cover;
  background-position: center;

  filter: blur(8px);       /* blur effect */
  z-index: -1;             /* send behind content */
}

}

.card {

}

.price {

}

button {

  color: white;

}

button:hover {

}

</style>
