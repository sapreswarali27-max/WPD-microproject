<style>

/* Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items:center;
    padding: 15px 15px;
    background: white;
    color: #0f172a;
    border: 2px solid skyblue;
}

.navbar a {
     text-decoration: none;
     color: black;
     padding: 0 15px;
     font-weight: 500;
     font-family: sans-serif;
}

.navbar ul li {
     margin: 0 15px;

} 

body {
  margin: 0;
  font-family: Arial;
  background: AliceBlue;
  color: skyblue;
}

/* Heading */
h1 {
  text-align: center;
  padding: 20px;
  font-size: 40px;
  border: 4px solid LightSkyBlue;
}

/* Container */
.container {
  width: 50%;
  margin: auto;
  background: skyblue;
  padding: 30px;
  border-radius: 10px;
  box-shadow: 0px 0px 15px black;
}

/* Inputs */
input, textarea {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border: none;
  border-radius: 5px;
}

/* Button */
button {
  width: 100%;
  padding: 12px;
  background: skyblue;
  color: white;
  font-size: 16px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

/* Hover */
button:hover {
  background: green;
}

/* Info */
.info {
  text-align: center;
  margin-top: 20px;
  font-size: 18px;
}
</style>
